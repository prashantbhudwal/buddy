name: Vendor Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  vendor-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Resolve diff range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before_sha="${{ github.event.before }}"
          if [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            empty_tree="$(git hash-object -t tree /dev/null)"
            echo "range=$empty_tree..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "range=$before_sha..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Allow explicit vendor sync commits
        id: allow
        shell: bash
        run: |
          set -euo pipefail
          range="${{ steps.range.outputs.range }}"
          if git log --format=%s "$range" | grep -E '^chore\(vendor\): sync opencode' >/dev/null; then
            echo "allow=1" >> "$GITHUB_OUTPUT"
          else
            echo "allow=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce vendor guard
        env:
          ALLOW_VENDOR_SYNC: ${{ steps.allow.outputs.allow }}
        run: bun run script/vendor-guard.ts --range "${{ steps.range.outputs.range }}"
