name: publish
run-name: "${{ format('release {0}', github.ref_type == 'tag' && github.ref_name || inputs.version || inputs.bump || github.ref_name) }}"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref_type == 'tag' && github.ref_name || inputs.version || inputs.bump || github.sha }}

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - run: bun install

      - id: version
        run: bun ./script/version.ts
        env:
          GH_TOKEN: ${{ github.token }}
          BUDDY_BUMP: ${{ inputs.bump }}
          BUDDY_VERSION: ${{ inputs.version }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}
      repo: ${{ steps.version.outputs.repo }}

  build-sidecar:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - run: bun install

      - run: bun run --cwd packages/buddy build:release-sidecars

      - uses: actions/upload-artifact@v4
        with:
          name: buddy-sidecars
          path: packages/buddy/dist/release-sidecars

  build-tauri:
    needs:
      - version
      - build-sidecar
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - run: bun install

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.settings.target }}

      - uses: actions/download-artifact@v4
        with:
          name: buddy-sidecars
          path: packages/buddy/dist/release-sidecars

      - run: bun run --cwd packages/desktop prepare:release
        env:
          BUDDY_VERSION: ${{ needs.version.outputs.version }}
          BUDDY_RUST_TARGET: ${{ matrix.settings.target }}
          BUDDY_SIDECAR_ARTIFACT_DIR: ${{ github.workspace }}/packages/buddy/dist/release-sidecars

      - id: updater
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: tauri-apps/tauri-action@390cbe447412ced1303d35abe75287949e43437a
        if: steps.updater.outputs.enabled == 'true'
        timeout-minutes: 60
        with:
          projectPath: packages/desktop
          uploadWorkflowArtifacts: true
          args: --target ${{ matrix.settings.target }} --config ./src-tauri/tauri.prod.conf.json --verbose
          updaterJsonPreferNsis: true
          releaseId: ${{ needs.version.outputs.release }}
          tagName: ${{ needs.version.outputs.tag }}
          releaseDraft: true
          releaseAssetNamePattern: buddy-desktop-[platform]-[arch][ext]
          releaseCommitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: tauri-apps/tauri-action@390cbe447412ced1303d35abe75287949e43437a
        if: steps.updater.outputs.enabled != 'true'
        timeout-minutes: 60
        with:
          projectPath: packages/desktop
          uploadWorkflowArtifacts: true
          args: --target ${{ matrix.settings.target }} --config ./src-tauri/tauri.prod.noupdater.conf.json --verbose
          releaseId: ${{ needs.version.outputs.release }}
          tagName: ${{ needs.version.outputs.tag }}
          releaseDraft: true
          releaseAssetNamePattern: buddy-desktop-[platform]-[arch][ext]
          releaseCommitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

  publish:
    needs:
      - version
      - build-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - run: bun install

      - run: bun ./script/publish.ts
        env:
          GH_TOKEN: ${{ github.token }}
          BUDDY_VERSION: ${{ needs.version.outputs.version }}
          BUDDY_RELEASE: ${{ needs.version.outputs.release }}
